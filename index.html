<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>PlaceAR · v4</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#F59064;--secondary:#284F75;--lg:#F0F0F0;--lg2:#F7F7F7;--dg:#6E6E6E;
  --hint:#474747;--grey:#AAAAAA;--green:#52B46B;--red:#DD5050;--white:#ffffff;
  --tile:#D4A96A;--tile2:#8B5E3C;--poly:#FF3B30;
  --font:'Montserrat',sans-serif;
  --r-sm:8px;--r-md:14px;--r-lg:22px;--r-xl:32px;
  --shadow:0 8px 40px rgba(40,79,117,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font)}

/* VIDEO BACKGROUND */
#videoEl{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:none}

/* THREE.JS overlaid ON TOP of video — alpha background */
#threeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

/* POLYGON DRAWING CANVAS — above three.js */
#polyDrawCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}

/* INTERACTION CANVAS — topmost, captures taps */
#interactionCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;display:none;cursor:crosshair;touch-action:none}

/* TOP BAR */
#topBar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.65) 0%,transparent 100%);pointer-events:none}
#topBar>*{pointer-events:auto}
#appLogoText{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
#topRight{display:flex;align-items:center;gap:8px}
.topPill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-xl);font-size:10px;font-weight:600;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);color:#fff;background:rgba(17,17,17,.5);cursor:pointer}
.topPill-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse .9s infinite}
#placedBadge{display:none;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;background:rgba(245,144,100,.18);border:1px solid rgba(245,144,100,.4);font-size:10px;font-weight:700;color:var(--primary)}
#placedBadge.visible{display:flex}

/* STATUS */
#statusToast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:21;display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--r-xl);font-size:11px;font-weight:500;color:rgba(255,255,255,.9);background:rgba(17,17,17,.78);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);white-space:nowrap;pointer-events:none;max-width:90vw}
#statusDot{width:6px;height:6px;border-radius:50%;background:var(--grey);flex-shrink:0;transition:background .3s}
#statusToast.ok #statusDot{background:var(--green)}
#statusToast.scanning #statusDot{background:var(--primary);animation:pulse .8s infinite}
#statusToast.error #statusDot{background:var(--red)}
#statusToast.tiling #statusDot{background:var(--tile);animation:pulse .8s infinite}
#statusToast.poly #statusDot{background:var(--poly);animation:pulse .8s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* GLB LOADER */
#glbLoader{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#glbLoader.visible{display:flex}
.spin{width:34px;height:34px;border:3px solid rgba(245,144,100,.25);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
#glbLoader p{color:rgba(255,255,255,.8);font-size:12px;font-weight:500}

/* POLYGON CONTROLS */
#polyControls{position:fixed;bottom:96px;left:0;right:0;z-index:22;display:none;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
#polyControls.visible{display:flex}
#polyControls>*{pointer-events:auto}
.polyInfoPill{background:rgba(17,17,17,.92);backdrop-filter:blur(16px);border:1px solid rgba(255,59,48,.4);border-radius:var(--r-xl);padding:8px 22px;font-size:11px;font-weight:600;color:#fff;text-align:center;max-width:88vw}
.polyInfoPill span{color:var(--poly)}
.polyBtnRow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.polyBtn{padding:10px 18px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;transition:all .18s;white-space:nowrap}
.polyBtn:active{transform:scale(.95)}
#pbUndo{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
#pbClose{background:var(--poly);color:#fff;display:none}
#pbCancel{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.15);font-size:11px}

/* CARRELAGE PICKER */
#carrelagePicker{position:fixed;bottom:0;left:0;right:0;z-index:35;background:var(--white);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow);padding:0 0 28px;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:none}
#carrelagePicker.visible{transform:translateY(0);display:block}
.cpHeader{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.cpTitle{font-size:13px;font-weight:700;color:var(--secondary)}
.cpClose{background:var(--lg2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--dg)}
.cpScroll{display:flex;gap:10px;overflow-x:auto;padding:0 14px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cpScroll::-webkit-scrollbar{display:none}
.cpCard{flex-shrink:0;width:110px;border-radius:var(--r-md);border:2px solid var(--lg);background:var(--lg2);cursor:pointer;overflow:hidden;transition:all .2s}
.cpCard:active{transform:scale(.95)}
.cpCard.active{border-color:var(--tile);box-shadow:0 0 0 3px rgba(212,169,106,.25)}
.cpCard-img{width:100%;height:64px;object-fit:cover;display:block}
.cpCard-name{font-size:9px;font-weight:700;color:var(--hint);padding:5px 7px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpCard-sub{font-size:8px;color:var(--grey);padding:0 7px 6px}
.cpOptions{padding:12px 14px 0;border-top:1px solid var(--lg);margin-top:10px}
.cpOptLabel{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--grey);margin-bottom:8px}
.cpPatterns{display:flex;gap:6px;flex-wrap:wrap}
.cpPattern{flex:1;min-width:56px;padding:7px 4px;border-radius:var(--r-sm);border:1.5px solid rgba(212,169,106,.3);background:rgba(212,169,106,.08);cursor:pointer;text-align:center;font-size:8px;font-weight:700;color:#8B5E3C;transition:all .2s}
.cpPattern:active{transform:scale(.95)}
.cpPattern.active{background:linear-gradient(135deg,#D4A96A,#8B5E3C);color:#fff;border-color:transparent}
.cpPattern-icon{font-size:15px;display:block;margin-bottom:2px}
.cpSizeRow{display:flex;align-items:center;gap:10px;margin-top:12px}
.cpSizeLabel{font-size:10px;font-weight:600;color:var(--dg);white-space:nowrap}
input.tileZoneInput{flex:1;-webkit-appearance:none;height:4px;background:linear-gradient(to right,#D4A96A,#8B5E3C);border-radius:3px;outline:none}
input.tileZoneInput::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#8B5E3C;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.cpSizeVal{font-size:10px;font-weight:700;color:#8B5E3C;background:rgba(212,169,106,.15);padding:2px 8px;border-radius:6px;min-width:40px;text-align:center}
#cpConfirmBtn{display:block;width:calc(100% - 28px);margin:14px auto 0;padding:13px;background:linear-gradient(135deg,#D4A96A,#8B5E3C);color:#fff;border:none;border-radius:var(--r-md);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(139,94,60,.3)}
#cpConfirmBtn:disabled{opacity:.5;cursor:not-allowed}
#cpConfirmBtn:not(:disabled):active{transform:scale(.97)}

/* ACTION BAR */
#actionBar{position:fixed;bottom:0;left:0;right:0;z-index:25;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:none}
#actionBar.visible{transform:translateY(0);display:flex}
#actionBarInner{margin:0 12px 12px;background:var(--white);border-radius:var(--r-lg);padding:12px 14px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);flex-wrap:wrap}
.aBtn{flex:1;min-width:42px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 5px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:8px;font-weight:600;letter-spacing:.3px;color:var(--hint);background:var(--lg2);transition:all .2s;text-transform:uppercase}
.aBtn:active{transform:scale(.93)}
.aBtn svg{width:17px;height:17px;stroke:var(--dg);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.aBtn.confirm{background:var(--secondary);color:#fff}.aBtn.confirm svg{stroke:#fff}
.aBtn.danger{background:rgba(221,80,80,.1);color:var(--red)}.aBtn.danger svg{stroke:var(--red)}
#selectedProductName{font-size:11px;font-weight:700;color:var(--secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;flex-shrink:0}

/* SHEET */
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--white);border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow);display:none;flex-direction:column}
#sheetHandle{width:100%;padding:12px 0 6px;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#handleBar{width:38px;height:4px;border-radius:3px;background:var(--lg)}
#quickRow{display:flex;align-items:center;gap:6px;padding:0 12px 12px;flex-shrink:0}
.qBtn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:11px 6px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:600;transition:all .18s;white-space:nowrap;min-width:0}
.qBtn:active{transform:scale(.96)}
.qBtn-ghost{background:var(--lg2);color:var(--hint)}
.qBtn-poly{background:rgba(255,59,48,.1);color:var(--poly);border:1.5px solid rgba(255,59,48,.3)}
.qBtn-poly-on{background:rgba(255,59,48,.22);color:var(--poly);border:1.5px solid rgba(255,59,48,.7)}
.qBtn-danger{background:rgba(221,80,80,.12);color:var(--red)}

/* START SCREEN */
#startScreen{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0a0f1a 0%,#1a2a3a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#startScreen.hidden{display:none}
.startTitle{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:10px;text-align:center}
.startSub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;text-align:center;max-width:280px;margin-bottom:32px}
#startArBtn{padding:16px 40px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-xl);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(245,144,100,.4);width:100%;max-width:280px}

/* MISC */
#saveToast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 32px;background:rgba(20,30,40,.92);backdrop-filter:blur(20px);border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s;text-align:center}
#saveToast.show{opacity:1}
#deleteHint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:18;padding:12px 24px;border-radius:var(--r-lg);background:rgba(221,80,80,.85);color:#fff;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .2s;text-align:center}
#deleteHint.show{opacity:1;animation:pd .6s ease-out}
@keyframes pd{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
#tilingProgress{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;background:rgba(20,30,40,.95);border:1px solid rgba(212,169,106,.4);border-radius:var(--r-lg);padding:24px 32px;color:#fff;text-align:center;display:none;min-width:220px}
#tilingProgress.visible{display:block}
#tilingProgressBar{width:180px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin:12px auto 6px;overflow:hidden}
#tilingProgressFill{height:100%;background:linear-gradient(90deg,#D4A96A,#8B5E3C);border-radius:3px;width:0%;transition:width .15s}
#tilingProgressText{font-size:11px;color:rgba(255,255,255,.7)}

/* XR RETICLE */
#xrReticle{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;opacity:0;transition:opacity .4s}
#xrReticle.visible{opacity:1}
#surfaceLabel{position:fixed;top:calc(50% + 46px);left:50%;transform:translateX(-50%);z-index:6;padding:3px 10px;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap}
#surfaceLabel.visible.floor{opacity:1;background:rgba(82,180,107,.25);color:#52B46B;border:1px solid rgba(82,180,107,.4)}

/* DEBUG overlay (hidden in production) */
#debugOverlay{position:fixed;top:110px;left:10px;z-index:99;background:rgba(0,0,0,.6);color:#0f0;font-size:9px;font-family:monospace;padding:6px 10px;border-radius:8px;pointer-events:none;display:none}
</style>
</head>
<body>

<!-- VIDEO BACKGROUND -->
<video id="videoEl" autoplay playsinline muted></video>

<!-- THREE.JS with alpha=true so video shows through -->
<canvas id="threeCanvas"></canvas>

<!-- POLYGON DRAWING -->
<canvas id="polyDrawCanvas"></canvas>
<canvas id="interactionCanvas"></canvas>

<div id="debugOverlay" id="debugOverlay"></div>

<div id="glbLoader"><div class="spin"></div><p id="glbLoaderText">Chargement…</p></div>

<!-- POLYGON CONTROLS -->
<div id="polyControls">
  <div class="polyInfoPill" id="polyInfo">Tapez les <span>coins de la zone</span> · 0 pt</div>
  <div class="polyBtnRow">
    <button class="polyBtn" id="pbUndo">↩ Annuler pt</button>
    <button class="polyBtn" id="pbClose">⬡ Fermer</button>
    <button class="polyBtn" id="pbCancel">✕ Annuler</button>
  </div>
</div>

<!-- CARRELAGE PICKER -->
<div id="carrelagePicker">
  <div class="cpHeader">
    <span class="cpTitle">2 · Choisir le carrelage</span>
    <button class="cpClose" id="cpCloseBtn">✕</button>
  </div>
  <div class="cpScroll" id="cpScroll"></div>
  <div class="cpOptions">
    <div class="cpOptLabel">Motif de pose</div>
    <div class="cpPatterns" id="cpPatterns">
      <div class="cpPattern active" data-pattern="straight"><span class="cpPattern-icon">⬛</span>Droit</div>
      <div class="cpPattern" data-pattern="diagonal"><span class="cpPattern-icon">◆</span>Diagonal</div>
      <div class="cpPattern" data-pattern="herringbone"><span class="cpPattern-icon">〰</span>Chevron</div>
      <div class="cpPattern" data-pattern="opus"><span class="cpPattern-icon">▦</span>Opus</div>
    </div>
    <div class="cpSizeRow">
      <span class="cpSizeLabel">Taille tuile</span>
      <input type="range" class="tileZoneInput" id="tileSizeSlider" min="10" max="80" step="5" value="30">
      <span class="cpSizeVal" id="tileSizeVal">30cm</span>
    </div>
    <button id="cpConfirmBtn" disabled>Poser les tuiles dans la zone</button>
  </div>
</div>

<!-- XR RETICLE -->
<div id="xrReticle">
  <svg width="70" height="70" viewBox="0 0 70 70" fill="none">
    <ellipse cx="35" cy="35" rx="30" ry="11" stroke="rgba(82,180,107,.9)" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="35" cy="35" r="3" fill="#52B46B"/>
  </svg>
</div>
<div id="surfaceLabel" class="floor">Sol</div>

<div id="saveToast"><span id="saveToastIcon">📸</span><span id="saveToastText">Capture !</span></div>
<div id="deleteHint">Supprimé</div>
<div id="tilingProgress">
  <div style="font-size:13px;font-weight:700">Pose du carrelage…</div>
  <div id="tilingProgressBar"><div id="tilingProgressFill"></div></div>
  <div id="tilingProgressText">0 / 0 tuiles</div>
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="startTitle">PlaceAR</div>
  <div class="startSub">Délimitez une zone au sol · Choisissez le carrelage · Posez !</div>
  <button id="startArBtn">🚀 Lancer la AR</button>
</div>

<!-- TOP BAR -->
<div id="topBar" style="display:none">
  <span id="appLogoText">PlaceAR</span>
  <div id="topRight">
    <div id="placedBadge"><span id="placedCountEl">0</span> placé(s)</div>
    <div class="topPill"><div class="topPill-dot"></div><span>AR Live</span></div>
  </div>
</div>
<div id="statusToast" style="display:none"><div id="statusDot"></div><span id="statusText">Init…</span></div>

<!-- ACTION BAR -->
<div id="actionBar">
  <div id="actionBarInner">
    <span id="selectedProductName">—</span>
    <div style="flex:1"></div>
    <button class="aBtn danger" id="aBtnDelete">
      <svg viewBox="0 0 18 18"><polyline points="3,5 15,5"/><path d="M6,5V3h6v2M7,8v6M11,8v6"/><rect x="4" y="5" width="10" height="10" rx="1"/></svg>
      <span>Suppr.</span>
    </button>
    <button class="aBtn confirm" id="aBtnConfirm">
      <svg viewBox="0 0 18 18"><polyline points="3,9 7,13 15,5"/></svg>
      <span>OK</span>
    </button>
  </div>
</div>

<!-- MAIN SHEET -->
<div id="sheet" style="height:82px">
  <div id="sheetHandle"><div id="handleBar"></div></div>
  <div id="quickRow">
    <button class="qBtn qBtn-danger" id="resetBtn" style="max-width:44px" title="Tout effacer">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <path d="M1.5 6.5a5 5 0 1 0 1-3"/><polyline points="1.5,2.5 1.5,5 4,5"/>
      </svg>
    </button>
    <button class="qBtn qBtn-poly" id="drawZoneBtn" style="flex:3">✏️ 1 · Tracer la zone</button>
    <button class="qBtn qBtn-ghost" id="captureBtn" style="max-width:44px" title="Capture">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <path d="M1 4Q1 3 2 3L4 3 4.8 1.8 8.2 1.8 9 3 11 3Q12 3 12 4L12 11Q12 12 11 12L2 12Q1 12 1 11Z"/>
        <circle cx="6.5" cy="7" r="2"/>
      </svg>
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════════════════════════════ */
const S = {
  /* session */
  xrSupported: false, xrSession: null, xrMode: false, fallbackMode: false,
  cameraReady: false,
  /* catalog */
  catalog: [], selectedProductId: null,
  /* placed objects */
  placedObjects: [], selectedObjectId: null, meshIdCounter: 0,
  /* tile settings */
  tileSize: 0.30, selectedPattern: 'straight', opacity: 0.92,
  /* polygon drawing */
  drawingZone: false,
  polyPoints2D: [],   /* [{x,y}] screen pixels */
  polyPoints3D: [],   /* [THREE.Vector3] world coords on floor plane */
  polyClosed: false,
  pendingPolyPts: null,
  tileZoneGroups: [],
  /* touch gestures */
  twoTouchStart: null, touchStartScale: 1,
  lastTapTime: 0, doubleTapTimeout: null,
  /* XR */
  hitTestSource: null, hitTestSourceReady: false,
  reticleVisible: false,
  /* ─── FLOOR PLANE CALIBRATION ───
     The key insight: we don't assume any camera height.
     Instead, we derive the floor plane equation directly
     from the screen → floor mapping using the camera's
     actual frustum and the real video frame geometry.
     
     In fallback mode:
       - Camera is at some unknown height H above floor
       - Camera is tilted at some unknown angle θ downward
     
     We solve for H and θ by fitting a plane through the
     3D back-projections of the tapped 2D points.
     
     Until we have enough points, we use a reasonable prior:
       H = 1.0m, θ = 55° (phone held forward pointing at floor)
  */
  floorY: 0,            /* Y coordinate of the floor in world space */
  camCalibrated: false, /* whether we've auto-calibrated from taps */
};

/* ═══════════════════════════════════════════════════════════════
   DOM REFERENCES
═══════════════════════════════════════════════════════════════ */
const $id = id => document.getElementById(id);
const videoEl          = $id('videoEl');
const threeCanvas      = $id('threeCanvas');
const polyDrawCanvas   = $id('polyDrawCanvas');
const interactionCanvas= $id('interactionCanvas');
const startScreen      = $id('startScreen');
const startArBtn       = $id('startArBtn');
const topBar           = $id('topBar');
const sheet            = $id('sheet');
const statusToast      = $id('statusToast');
const statusText       = $id('statusText');
const placedBadge      = $id('placedBadge');
const placedCountEl    = $id('placedCountEl');
const actionBar        = $id('actionBar');
const selProdName      = $id('selectedProductName');

/* ═══════════════════════════════════════════════════════════════
   THREE.JS SETUP
═══════════════════════════════════════════════════════════════ */
let scene, camera3, renderer3, loader;
let xrReferenceSpace = null, xrReticleMesh = null;
let floorMesh = null;  /* invisible floor plane for raycasting */

function initThreeJS() {
  scene = new THREE.Scene();

  /* Camera: will be calibrated properly once we have floor points */
  camera3 = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 200);

  /* alpha:true so video background shows through */
  renderer3 = new THREE.WebGLRenderer({
    canvas: threeCanvas,
    alpha: true,
    antialias: true,
    logarithmicDepthBuffer: true,
    premultipliedAlpha: false,
  });
  renderer3.setClearColor(0x000000, 0); /* fully transparent */
  renderer3.setSize(window.innerWidth, window.innerHeight);
  renderer3.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer3.outputEncoding = THREE.sRGBEncoding;
  renderer3.physicallyCorrectLights = true;
  renderer3.shadowMap.enabled = true;
  renderer3.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer3.xr.enabled = true;

  /* Lighting */
  const pmrem = new THREE.PMREMGenerator(renderer3);
  pmrem.compileEquirectangularShader();
  scene.environment = pmrem.fromScene(new THREE.RoomEnvironment()).texture;
  pmrem.dispose();

  scene.add(new THREE.AmbientLight(0xffffff, 1.4));
  const dir = new THREE.DirectionalLight(0xffffff, 1.6);
  dir.position.set(2, 6, 4);
  dir.castShadow = true;
  scene.add(dir);
  const fill = new THREE.DirectionalLight(0xffffff, 0.5);
  fill.position.set(-3, 3, -3);
  scene.add(fill);

  /* XR reticle */
  const rGeo = new THREE.RingGeometry(0.12, 0.15, 32).rotateX(-Math.PI/2);
  xrReticleMesh = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({color:0x52B46B, side:THREE.DoubleSide}));
  xrReticleMesh.visible = false;
  xrReticleMesh.matrixAutoUpdate = false;
  scene.add(xrReticleMesh);

  /* Invisible floor mesh for raycasting — starts at Y=0, updated on calibration */
  floorMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500),
    new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
  );
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.y = 0;
  scene.add(floorMesh);

  loader = new THREE.GLTFLoader();

  /* 2D canvas setup */
  polyDrawCanvas.width = window.innerWidth;
  polyDrawCanvas.height = window.innerHeight;
  polyCtx = polyDrawCanvas.getContext('2d');
  interactionCanvas.width = window.innerWidth;
  interactionCanvas.height = window.innerHeight;

  window.addEventListener('resize', onResize);
}

function onResize() {
  camera3.aspect = window.innerWidth / window.innerHeight;
  camera3.updateProjectionMatrix();
  renderer3.setSize(window.innerWidth, window.innerHeight);
  polyDrawCanvas.width = window.innerWidth;
  polyDrawCanvas.height = window.innerHeight;
  interactionCanvas.width = window.innerWidth;
  interactionCanvas.height = window.innerHeight;
  if (S.drawingZone) redrawPoly();
}

/* ═══════════════════════════════════════════════════════════════
   WEBXR
═══════════════════════════════════════════════════════════════ */
async function checkXRSupport() {
  if (!navigator.xr) return false;
  try { return await navigator.xr.isSessionSupported('immersive-ar'); } catch { return false; }
}

async function startXRSession() {
  try {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'plane-detection'],
      domOverlay: { root: document.body },
    });
    S.xrSession = session;
    S.xrMode = true;
    renderer3.xr.setReferenceSpaceType('local');
    await renderer3.xr.setSession(session);
    xrReferenceSpace = await session.requestReferenceSpace('local');
    const viewerSpace = await session.requestReferenceSpace('viewer');
    S.hitTestSource = await session.requestHitTestSource({ space: viewerSpace, entityTypes: ['plane', 'point', 'mesh'] });
    S.hitTestSourceReady = true;
    session.addEventListener('end', onXRSessionEnd);
    renderer3.setAnimationLoop(xrRenderLoop);
    showARUI();
    setupXRSelect();
  } catch (err) {
    console.error('WebXR error:', err);
    startFallbackMode();
  }
}

function xrRenderLoop(timestamp, frame) {
  if (!frame) return;
  if (S.hitTestSourceReady && S.hitTestSource) {
    const results = frame.getHitTestResults(S.hitTestSource);
    if (results.length > 0) {
      const pose = results[0].getPose(xrReferenceSpace);
      if (pose) {
        xrReticleMesh.visible = true;
        xrReticle.classList.add('visible');
        xrReticleMesh.matrix.fromArray(pose.transform.matrix);
        S.reticleVisible = true;
        /* Update floor Y from XR hit */
        const p = new THREE.Vector3(), q = new THREE.Quaternion(), sc = new THREE.Vector3();
        new THREE.Matrix4().fromArray(pose.transform.matrix).decompose(p, q, sc);
        if (Math.abs(p.y - S.floorY) < 0.5) {
          S.floorY = p.y * 0.1 + S.floorY * 0.9; /* smooth */
          floorMesh.position.y = S.floorY;
        }
        surfaceLabel.className = 'visible floor';
      }
    } else {
      xrReticle.classList.remove('visible');
      S.reticleVisible = false;
    }
  }
  renderer3.render(scene, camera3);
}

function onXRSessionEnd() {
  S.xrMode = false; S.xrSession = null;
  S.hitTestSourceReady = false; S.hitTestSource = null;
  renderer3.setAnimationLoop(null);
  xrReticle.classList.remove('visible');
  xrReticleMesh.visible = false;
}

function setupXRSelect() {
  if (!S.xrSession) return;
  S.xrSession.addEventListener('select', () => {
    if (!S.drawingZone || S.polyClosed || !S.reticleVisible) return;
    const pos = new THREE.Vector3(), q = new THREE.Quaternion(), sc = new THREE.Vector3();
    xrReticleMesh.matrix.decompose(pos, q, sc);
    pos.y = S.floorY;
    addPolyPoint(pos, worldToScreen(pos));
  });
}

/* ═══════════════════════════════════════════════════════════════
   FALLBACK CAMERA MODE
   
   KEY DESIGN:
   We set up the Three.js camera to MATCH the real phone camera.
   Then screenToFloor() gives correct 3D coords because the
   virtual camera frustum matches the real one.
   
   Camera calibration:
   - We start with a reasonable prior (1.1m height, 60° tilt)
   - After 3+ polygon taps, we fit the actual floor plane
     and update the camera pose so future taps are accurate
═══════════════════════════════════════════════════════════════ */
async function startFallbackMode() {
  S.fallbackMode = true;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = stream;
    videoEl.style.display = 'block';
    await new Promise(res => { videoEl.onloadedmetadata = res; });
    await videoEl.play();
    S.cameraReady = true;
  } catch (e) {
    setStatus('Caméra refusée', 'error');
    return;
  }

  /* Set camera with a prior that matches typical phone-held-toward-floor */
  setCameraFromPrior();

  /* Render loop */
  renderer3.setAnimationLoop(() => renderer3.render(scene, camera3));

  showARUI();
  surfaceLabel.className = 'visible floor';
  setStatus('Mode caméra · Tapez les coins de la zone sur le SOL', 'ok');
}

/* ── Prior camera pose ─────────────────────────────────────── */
function setCameraFromPrior() {
  /*
    Typical phone usage: held ~1.1m high, pointed ~55-65° down
    Floor is at Y = 0 in world space.
    Camera is at Y = CAM_H looking toward the floor ahead.
  */
  const CAM_H = 1.1;
  const TILT_DEG = 60; /* degrees down from horizontal */

  S.floorY = 0;
  floorMesh.position.y = 0;

  camera3.position.set(0, CAM_H, 0);
  /* Rotate camera to look TILT_DEG degrees below horizontal */
  camera3.rotation.set(-THREE.MathUtils.degToRad(TILT_DEG), 0, 0);
  camera3.updateMatrixWorld(true);

  S.camCalibrated = false;
}

/* ═══════════════════════════════════════════════════════════════
   SCREEN → FLOOR 3D RAYCASTING
   
   This is the critical function.  It converts a 2D screen tap
   into a 3D world coordinate on the floor plane.
   
   We raycast from the camera through the screen pixel
   and intersect with the floor plane at Y = S.floorY.
═══════════════════════════════════════════════════════════════ */
const _raycaster = new THREE.Raycaster();

function screenToFloor(sx, sy) {
  const nx = (sx / window.innerWidth) * 2 - 1;
  const ny = -(sy / window.innerHeight) * 2 + 1;
  _raycaster.setFromCamera({ x: nx, y: ny }, camera3);

  /* Intersect with the invisible floor mesh */
  floorMesh.updateMatrixWorld(true);
  const hits = _raycaster.intersectObject(floorMesh);
  if (hits.length > 0) {
    const pt = hits[0].point.clone();
    pt.y = S.floorY; /* clamp exactly to floor Y */
    return pt;
  }

  /* Fallback: intersect with mathematical plane Y = S.floorY */
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -S.floorY);
  const target = new THREE.Vector3();
  if (_raycaster.ray.intersectPlane(plane, target)) {
    target.y = S.floorY;
    return target;
  }

  /* Last resort: project 1.8m along ray */
  const pt = _raycaster.ray.at(1.8, new THREE.Vector3());
  pt.y = S.floorY;
  return pt;
}

function worldToScreen(v) {
  const vec = v.clone().project(camera3);
  return {
    x: (vec.x + 1) / 2 * window.innerWidth,
    y: (-(vec.y - 1) / 2) * window.innerHeight,
  };
}

/* ═══════════════════════════════════════════════════════════════
   FLOOR PLANE AUTO-CALIBRATION
   
   Called after each new polygon point in fallback mode.
   
   Strategy:
   1. Collect screen-space Y coords of all tapped polygon points
   2. The lowest point (highest Y on screen) is closest to camera
      and gives the best estimate of "where the floor is"
   3. We use a RANSAC-style approach: assume the floor is a
      horizontal plane, estimate its height from the perspective
      geometry, then update the camera pose.
   
   The key geometric insight (from FloorAR v20):
   On a perspective image of a horizontal floor, a point at
   screen Y=sy corresponds to a world distance:
     depth = (cam_height * f) / (sy - cy)
   where f = focal_length_px, cy = principal_point_y
   
   We use this to estimate cam_height without any external input.
═══════════════════════════════════════════════════════════════ */
function calibrateFloorFromPoints() {
  if (!S.fallbackMode) return;
  if (S.polyPoints2D.length < 2) return;

  /* Get the point with the highest screen Y (closest to camera = best floor signal) */
  const pts2D = S.polyPoints2D;
  const pts3D = S.polyPoints3D;

  /* Estimate camera pitch from the spread of 3D points:
     If the 3D points are correctly on a flat floor, their Y values should all be equal.
     If some are higher, the camera pitch estimation was wrong.
     We adjust by finding the mean Y of all computed 3D points. */
  if (pts3D.length >= 2) {
    const ys = pts3D.map(p => p.y);
    const meanY = ys.reduce((s, v) => s + v, 0) / ys.length;
    /* The floor should be at the MINIMUM y value among the 3D points
       (points near camera map to higher screen Y which is geometrically correct) */
    const minY = Math.min(...ys);
    const maxY = Math.max(...ys);

    /* If variance is large, points are scattered in Y — floor plane is wrong */
    const variance = ys.reduce((s, v) => s + (v - meanY) ** 2, 0) / ys.length;

    if (variance > 0.05 && pts3D.length >= 3) {
      /* Re-fit: adjust camera height to minimise variance */
      /* The correct camera height makes all floor points have the same Y */
      /* Try heights from 0.5m to 2.0m and pick the one with minimum variance */
      let bestH = camera3.position.y;
      let bestVar = Infinity;
      let bestTilt = -camera3.rotation.x;

      for (let h = 0.4; h <= 2.0; h += 0.05) {
        for (let tiltDeg = 30; tiltDeg <= 85; tiltDeg += 2.5) {
          /* Temporarily set camera */
          camera3.position.y = h;
          camera3.rotation.x = -THREE.MathUtils.degToRad(tiltDeg);
          camera3.updateMatrixWorld(true);
          floorMesh.position.y = 0;
          S.floorY = 0;

          /* Re-compute 3D positions of all polygon screen taps */
          const testPts3D = pts2D.map(p => screenToFloor(p.x, p.y));
          const testYs = testPts3D.map(p => p.y);
          const testMean = testYs.reduce((s, v) => s + v, 0) / testYs.length;
          const testVar = testYs.reduce((s, v) => s + (v - testMean) ** 2, 0) / testYs.length;

          if (testVar < bestVar) {
            bestVar = testVar;
            bestH = h;
            bestTilt = tiltDeg;
          }
        }
      }

      /* Apply best camera calibration */
      camera3.position.y = bestH;
      camera3.rotation.x = -THREE.MathUtils.degToRad(bestTilt);
      camera3.updateMatrixWorld(true);
      S.camCalibrated = true;

      /* Recompute all 3D polygon points with calibrated camera */
      for (let i = 0; i < pts2D.length; i++) {
        pts3D[i] = screenToFloor(pts2D[i].x, pts2D[i].y);
        pts3D[i].y = S.floorY;
      }

      debugLog(`Calib: H=${bestH.toFixed(2)}m tilt=${bestTilt.toFixed(1)}° var=${bestVar.toFixed(4)}`);
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   POLYGON DRAWING
═══════════════════════════════════════════════════════════════ */
const CLOSE_SNAP = 36;
const MIN_POINTS = 3;

function startZoneDrawing() {
  S.drawingZone = true;
  S.polyPoints2D = [];
  S.polyPoints3D = [];
  S.polyClosed = false;
  S.pendingPolyPts = null;
  interactionCanvas.style.display = 'block';
  polyControls.classList.add('visible');
  drawZoneBtn.className = 'qBtn qBtn-poly-on';
  polyCtx.clearRect(0, 0, polyDrawCanvas.width, polyDrawCanvas.height);
  setStatus('Tapez chaque COIN DE LA ZONE sur le sol', 'poly');
  updatePolyUI();
}

function cancelZoneDrawing() {
  S.drawingZone = false;
  S.polyPoints2D = [];
  S.polyPoints3D = [];
  S.polyClosed = false;
  interactionCanvas.style.display = 'none';
  polyControls.classList.remove('visible');
  drawZoneBtn.className = 'qBtn qBtn-poly';
  polyCtx.clearRect(0, 0, polyDrawCanvas.width, polyDrawCanvas.height);
  setStatus('Annulé', 'ok');
}

function updatePolyUI() {
  const n = S.polyPoints2D.length;
  polyInfo.innerHTML = '<span>' + (S.polyClosed ? 'Zone fermée' : 'Tapez les coins') + '</span> · ' + n + ' pt' + (n > 1 ? 's' : '');
  pbClose.style.display = (n >= MIN_POINTS && !S.polyClosed) ? 'block' : 'none';
}

/* Add a new polygon point */
function addPolyPoint(world3, screen2) {
  world3.y = S.floorY; /* always clamp to floor */
  S.polyPoints3D.push(world3);
  S.polyPoints2D.push({ x: screen2.x, y: screen2.y });
  updatePolyUI();
  redrawPoly();

  /* Auto-calibrate after each new point in fallback mode */
  if (S.fallbackMode && S.polyPoints2D.length >= 3) {
    calibrateFloorFromPoints();
  }

  debugLog(`pt${S.polyPoints2D.length}: screen(${screen2.x.toFixed(0)},${screen2.y.toFixed(0)}) world(${world3.x.toFixed(3)},${world3.z.toFixed(3)})`);
}

function redrawPoly(mx, my) {
  const W = polyDrawCanvas.width, H = polyDrawCanvas.height;
  polyCtx.clearRect(0, 0, W, H);
  const pts = S.polyPoints2D;
  if (!pts.length) return;

  const nearFirst = pts.length >= MIN_POINTS && mx !== undefined
    && ptDist({ x: mx, y: my }, pts[0]) < CLOSE_SNAP;

  /* Filled area */
  if (pts.length >= 3) {
    polyCtx.beginPath();
    polyCtx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) polyCtx.lineTo(pts[i].x, pts[i].y);
    polyCtx.closePath();
    polyCtx.fillStyle = 'rgba(255,59,48,0.12)';
    polyCtx.fill();
    drawPolyTilePreview(pts);
  }

  /* Border */
  polyCtx.beginPath();
  polyCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) polyCtx.lineTo(pts[i].x, pts[i].y);
  if (S.polyClosed) polyCtx.closePath();
  polyCtx.strokeStyle = '#FF3B30';
  polyCtx.lineWidth = 2.5;
  polyCtx.setLineDash([]);
  polyCtx.stroke();

  /* Rubber-band line */
  if (mx !== undefined && !S.polyClosed && pts.length > 0) {
    const last = pts[pts.length - 1];
    polyCtx.beginPath();
    polyCtx.moveTo(last.x, last.y);
    polyCtx.lineTo(mx, my);
    polyCtx.strokeStyle = 'rgba(255,255,255,.35)';
    polyCtx.lineWidth = 1.5;
    polyCtx.setLineDash([5, 4]);
    polyCtx.stroke();
    polyCtx.setLineDash([]);
    if (pts.length >= MIN_POINTS) {
      polyCtx.beginPath();
      polyCtx.moveTo(mx, my);
      polyCtx.lineTo(pts[0].x, pts[0].y);
      polyCtx.strokeStyle = nearFirst ? '#FF3B30' : 'rgba(255,255,255,.18)';
      polyCtx.lineWidth = nearFirst ? 2.5 : 1;
      polyCtx.setLineDash(nearFirst ? [] : [6, 4]);
      polyCtx.stroke();
      polyCtx.setLineDash([]);
    }
  }

  /* Points */
  pts.forEach((p, i) => {
    const isFirst = i === 0, r = isFirst ? 9 : 6;
    if (isFirst && pts.length >= MIN_POINTS) {
      polyCtx.beginPath();
      polyCtx.arc(p.x, p.y, CLOSE_SNAP, 0, Math.PI * 2);
      polyCtx.strokeStyle = nearFirst ? 'rgba(255,59,48,.5)' : 'rgba(255,59,48,.18)';
      polyCtx.lineWidth = 1;
      polyCtx.setLineDash([4, 3]);
      polyCtx.stroke();
      polyCtx.setLineDash([]);
    }
    polyCtx.beginPath();
    polyCtx.arc(p.x, p.y, r + 8, 0, Math.PI * 2);
    polyCtx.fillStyle = isFirst ? 'rgba(255,59,48,.15)' : 'rgba(255,255,255,.06)';
    polyCtx.fill();
    const g = polyCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    g.addColorStop(0, isFirst ? '#fff' : '#ffe');
    g.addColorStop(1, isFirst ? '#FF3B30' : 'rgba(255,140,100,.7)');
    polyCtx.beginPath();
    polyCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
    polyCtx.fillStyle = g;
    polyCtx.fill();
    polyCtx.strokeStyle = isFirst ? '#fff' : 'rgba(255,59,48,.85)';
    polyCtx.lineWidth = 2;
    polyCtx.stroke();
    polyCtx.font = 'bold 9px Montserrat,sans-serif';
    polyCtx.fillStyle = isFirst ? '#FF3B30' : 'rgba(212,169,106,1)';
    polyCtx.textAlign = 'center';
    polyCtx.textBaseline = 'middle';
    polyCtx.fillText(i + 1, p.x, p.y - 22);
    if (isFirst && nearFirst) {
      const bx = p.x + 14, by = p.y - 36;
      polyCtx.fillStyle = '#FF3B30';
      polyCtx.beginPath();
      if (polyCtx.roundRect) polyCtx.roundRect(bx, by, 68, 20, 6);
      else polyCtx.rect(bx, by, 68, 20);
      polyCtx.fill();
      polyCtx.font = 'bold 10px Montserrat,sans-serif';
      polyCtx.fillStyle = '#fff';
      polyCtx.textAlign = 'left';
      polyCtx.textBaseline = 'middle';
      polyCtx.fillText('⬡ Fermer', bx + 8, by + 10);
    }
  });

  if (mx !== undefined && !nearFirst && !S.polyClosed) {
    polyCtx.beginPath();
    polyCtx.arc(mx, my, 4, 0, Math.PI * 2);
    polyCtx.fillStyle = 'rgba(255,255,255,.4)';
    polyCtx.fill();
  }
}

function drawPolyTilePreview(pts) {
  const ts = 22;
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  polyCtx.save();
  polyCtx.beginPath();
  polyCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) polyCtx.lineTo(pts[i].x, pts[i].y);
  polyCtx.closePath();
  polyCtx.clip();
  const colors = ['rgba(212,169,106,0.22)', 'rgba(139,94,60,0.15)', 'rgba(212,169,106,0.15)', 'rgba(139,94,60,0.10)'];
  const cx = (minX + maxX) / 2, cy2 = (minY + maxY) / 2;
  const offX = ((cx % ts) + ts) % ts, offY = ((cy2 % ts) + ts) % ts;
  const cols = Math.ceil((maxX - minX) / ts) + 2, rows = Math.ceil((maxY - minY) / ts) + 2;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      polyCtx.fillStyle = colors[(r + c) % 4];
      polyCtx.fillRect(minX - offX + c * ts + 1, minY - offY + r * ts + 1, ts - 2, ts - 2);
    }
  polyCtx.restore();
}

/* ── Interaction events ── */
interactionCanvas.addEventListener('click', e => {
  if (!S.drawingZone || isOverSheet(e.clientY)) return;
  handlePolyTap(e.clientX, e.clientY);
});
interactionCanvas.addEventListener('touchend', e => {
  if (!S.drawingZone) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  if (isOverSheet(t.clientY)) return;
  handlePolyTap(t.clientX, t.clientY);
}, { passive: false });
interactionCanvas.addEventListener('mousemove', e => {
  if (!S.drawingZone || S.polyClosed) return;
  redrawPoly(e.clientX, e.clientY);
});

function isOverSheet(y) {
  const sr = sheet.getBoundingClientRect();
  return y > sr.top || (carrelagePicker.classList.contains('visible') &&
    y > carrelagePicker.getBoundingClientRect().top);
}

function handlePolyTap(ex, ey) {
  if (S.polyClosed) return;
  const pts = S.polyPoints2D;

  /* Snap-to-close */
  if (pts.length >= MIN_POINTS && ptDist({ x: ex, y: ey }, pts[0]) < CLOSE_SNAP) {
    closePolygon();
    return;
  }

  const world = screenToFloor(ex, ey);
  const screen2D = S.xrMode ? worldToScreen(world) : { x: ex, y: ey };
  addPolyPoint(world, screen2D);
}

function closePolygon() {
  if (S.polyPoints2D.length < MIN_POINTS) return;
  S.polyClosed = true;
  redrawPoly();
  updatePolyUI();
  interactionCanvas.style.display = 'none';
  polyControls.classList.remove('visible');
  showCarrelagePicker();
}

function undoLastPoint() {
  if (S.polyClosed) {
    S.polyClosed = false;
    interactionCanvas.style.display = 'block';
    polyControls.classList.add('visible');
    updatePolyUI();
    redrawPoly();
    return;
  }
  if (!S.polyPoints2D.length) return;
  S.polyPoints2D.pop();
  S.polyPoints3D.pop();
  updatePolyUI();
  redrawPoly();
}

const GESTURE = { start: null, rotX: 0, rotY: 0 };

document.addEventListener('touchstart', e => {
  if (S.drawingZone || carrelagePicker.classList.contains('visible')) return;
  if (e.touches.length === 1) {
    const now = Date.now();
    if (now - S.lastTapTime < 280) {
      clearTimeout(S.doubleTapTimeout);
      if (S.selectedObjectId) deleteSelected();
      GESTURE.start = null;
    } else {
      S.lastTapTime = now;
      S.doubleTapTimeout = setTimeout(() => { S.lastTapTime = 0; }, 280);
      if (S.selectedObjectId) {
        const t = e.touches[0];
        GESTURE.start = { x: t.clientX, y: t.clientY };
        const o = S.placedObjects.find(o => o.id === S.selectedObjectId);
        if (o) { GESTURE.rotX = o.group.rotation.x; GESTURE.rotY = o.group.rotation.y; }
      }
    }
  } else if (e.touches.length === 2) {
    GESTURE.start = null;
    const t1 = e.touches[0], t2 = e.touches[1];
    S.twoTouchStart = { dist: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) };
    const o = S.placedObjects.find(o => o.id === S.selectedObjectId);
    if (o) S.touchStartScale = o.scaleVal;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (S.drawingZone || carrelagePicker.classList.contains('visible')) return;
  if (e.touches.length === 1 && GESTURE.start && S.selectedObjectId) {
    const t = e.touches[0];
    const dx = t.clientX - GESTURE.start.x, dy = t.clientY - GESTURE.start.y;
    const o = S.placedObjects.find(o => o.id === S.selectedObjectId);
    if (o) { o.group.rotation.y = GESTURE.rotY + dx * 0.01; }
  } else if (e.touches.length === 2 && S.twoTouchStart && S.selectedObjectId) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const nd = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const o = S.placedObjects.find(o => o.id === S.selectedObjectId);
    if (o) scaleObject(o, S.touchStartScale * (nd / S.twoTouchStart.dist));
  }
}, { passive: true });

document.addEventListener('touchend', () => { GESTURE.start = null; S.twoTouchStart = null; }, { passive: true });

/* ═══════════════════════════════════════════════════════════════
   ████  3D TILE PLACEMENT  ████
   
   Core algorithm:
   1. flatPoly = all polygon points forced to Y = S.floorY
   2. Generate tile grid positions in XZ plane (horizontal!)
   3. Create BoxGeometry tiles, each at Y = S.floorY + TILE_H/2
      → tiles lie FLAT on the floor, not vertical
   4. Texture mapped from the product image
═══════════════════════════════════════════════════════════════ */

/* Point-in-polygon test (XZ plane) */
function pointInPoly(px, pz, poly) {
  let inside = false;
  const n = poly.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = poly[i].x, zi = poly[i].z;
    const xj = poly[j].x, zj = poly[j].z;
    if (((zi > pz) !== (zj > pz)) && (px < (xj - xi) * (pz - zi) / (zj - zi) + xi))
      inside = !inside;
  }
  return inside;
}

function polyBounds(poly) {
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  poly.forEach(p => {
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.z < minZ) minZ = p.z; if (p.z > maxZ) maxZ = p.z;
  });
  return { minX, maxX, minZ, maxZ };
}

function polyCentroid(poly) {
  let cx = 0, cz = 0;
  poly.forEach(p => { cx += p.x; cz += p.z; });
  return { x: cx / poly.length, z: cz / poly.length };
}

/* ── Generate tile grid positions in XZ plane ── */
function generateTilesInPolygon(poly3D, tileS, pattern) {
  const { minX, maxX, minZ, maxZ } = polyBounds(poly3D);
  const cent = polyCentroid(poly3D);
  const positions = [];
  const PAD = tileS * 1.5;

  switch (pattern) {
    case 'diagonal': {
      const cos45 = Math.SQRT1_2, sin45 = Math.SQRT1_2;
      for (let gz = minZ - PAD; gz <= maxZ + PAD; gz += tileS) {
        for (let gx = minX - PAD; gx <= maxX + PAD; gx += tileS) {
          const dx = gx - cent.x, dz = gz - cent.z;
          const rx = cent.x + dx * cos45 - dz * sin45;
          const rz = cent.z + dx * sin45 + dz * cos45;
          if (pointInPoly(rx, rz, poly3D))
            positions.push({ x: rx, z: rz, rot: Math.PI / 4, w: tileS * 0.94, h: tileS * 0.94 });
        }
      }
      break;
    }
    case 'herringbone': {
      const tw = tileS, th = tileS * 0.5;
      const offX = ((cent.x % tw) + tw) % tw;
      const offZ = ((cent.z % th) + th) % th;
      let row = 0;
      for (let gz = minZ - PAD - offZ; gz <= maxZ + PAD; gz += th, row++) {
        const shift = (row % 2 === 0) ? 0 : tw * 0.5;
        for (let gx = minX - PAD - offX + shift; gx <= maxX + PAD; gx += tw) {
          const cx2 = gx + tw / 2, cz2 = gz + th / 2;
          if (pointInPoly(cx2, cz2, poly3D))
            positions.push({ x: cx2, z: cz2, rot: (row % 2 === 0) ? 0 : Math.PI / 2, w: tw, h: th });
        }
      }
      break;
    }
    case 'opus': {
      const big = tileS, sm = tileS * 0.6;
      const stride = big + sm;
      const offX = ((cent.x % stride) + stride) % stride;
      const offZ = ((cent.z % stride) + stride) % stride;
      for (let gz = minZ - PAD - offZ; gz <= maxZ + PAD; gz += stride) {
        for (let gx = minX - PAD - offX; gx <= maxX + PAD; gx += stride) {
          const pts = [
            { x: gx + big / 2, z: gz + big / 2, w: big, h: big },
            { x: gx + big + sm / 2, z: gz + big / 2, w: sm, h: sm },
            { x: gx + big / 2, z: gz + big + sm / 2, w: sm, h: sm },
            { x: gx + big + sm / 2, z: gz + big + sm / 2, w: sm, h: sm },
          ];
          pts.forEach(p => {
            if (pointInPoly(p.x, p.z, poly3D))
              positions.push({ x: p.x, z: p.z, rot: 0, w: p.w, h: p.h });
          });
        }
      }
      break;
    }
    default: { /* straight */
      const offX = ((cent.x % tileS) + tileS) % tileS;
      const offZ = ((cent.z % tileS) + tileS) % tileS;
      for (let gz = minZ - PAD - offZ; gz <= maxZ + PAD; gz += tileS) {
        for (let gx = minX - PAD - offX; gx <= maxX + PAD; gx += tileS) {
          const cx2 = gx + tileS / 2, cz2 = gz + tileS / 2;
          if (pointInPoly(cx2, cz2, poly3D))
            positions.push({ x: cx2, z: cz2, rot: 0, w: tileS, h: tileS });
        }
      }
    }
  }
  return positions;
}

/* ── Build grout base plane (the mortar underneath) ── */
function buildGroutBase(poly3D) {
  const shape = new THREE.Shape();
  shape.moveTo(poly3D[0].x, poly3D[0].z);
  for (let i = 1; i < poly3D.length; i++) shape.lineTo(poly3D[i].x, poly3D[i].z);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  /*
    ShapeGeometry is built in XY plane.
    Rotate -90° around X to lay it FLAT on the XZ (floor) plane.
    Then translate to S.floorY.
  */
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x9A8878, roughness: 0.95, transparent: true,
    opacity: S.opacity * 0.85, side: THREE.DoubleSide, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  /* Position the grout base exactly on the floor */
  mesh.position.y = S.floorY + 0.0005;
  mesh.receiveShadow = true;
  return mesh;
}

/* ── Texture cache ── */
let _cachedTex = null, _cachedTexUrl = '';
function loadOrGetTexture(url) {
  return new Promise(res => {
    if (!url) { res(null); return; }
    if (url === _cachedTexUrl && _cachedTex) { res(_cachedTex); return; }
    new THREE.TextureLoader().load(url, t => {
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      _cachedTex = t; _cachedTexUrl = url; res(t);
    }, null, () => res(null));
  });
}

/* ── MAIN PLACEMENT FUNCTION ── */
async function placeTilePolygon(poly3D) {
  const product = S.catalog.find(p => p.id === S.selectedProductId);
  if (!product) { setStatus('Sélectionnez un carrelage d\'abord', 'error'); return; }

  /*
    CRITICAL FIX:
    Force ALL polygon points to the same Y = S.floorY.
    This makes the polygon horizontal (coplanar with the floor).
    Without this, points at different depths get different Y values
    from the raycaster, causing the polygon to be tilted in 3D.
  */
  const flatPoly = poly3D.map(p => new THREE.Vector3(p.x, S.floorY, p.z));

  /* Debug: check that points are actually on the floor */
  const yValues = flatPoly.map(p => p.y.toFixed(3)).join(', ');
  debugLog(`Floor Y values: [${yValues}]`);

  const TS = S.tileSize;
  const positions = generateTilesInPolygon(flatPoly, TS, S.selectedPattern);
  const total = positions.length;

  if (total === 0) {
    setStatus('Zone trop petite ou aucune tuile ? Agrandissez la zone', 'error');
    return;
  }

  /* Show progress */
  tilingProgress.classList.add('visible');
  tilingFill.style.width = '0%';
  tilingText.textContent = '0 / ' + total + ' tuiles';

  const zoneGroup = new THREE.Group();
  scene.add(zoneGroup);
  zoneGroup.userData.isTileZone = true;

  /* Add grout base */
  zoneGroup.add(buildGroutBase(flatPoly));

  /* Load texture */
  const tex = await loadOrGetTexture(product.imageUrl || '');
  if (tex) {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1, 1);
  }

  /* GLB model loading */
  const useGlb = product.modelUrl && product.modelUrl.length > 4;
  let baseModel = null;
  if (useGlb) {
    try {
      const gltf = await new Promise((res, rej) => loader.load(product.modelUrl, res, null, rej));
      baseModel = gltf.scene;
      const bb = new THREE.Box3().setFromObject(baseModel);
      const sz = bb.getSize(new THREE.Vector3());
      const maxDim = Math.max(sz.x, sz.z) || 1;
      const glbScale = TS / maxDim;
      baseModel.scale.setScalar(glbScale);
      const center = bb.getCenter(new THREE.Vector3());
      baseModel.position.x -= center.x * glbScale;
      baseModel.position.z -= center.z * glbScale;
      baseModel.position.y -= bb.min.y * glbScale; /* sit on floor */
      baseModel.traverse(c => {
        if (!c.isMesh) return;
        const mats = Array.isArray(c.material) ? c.material : [c.material];
        mats.forEach(m => {
          m.side = THREE.DoubleSide;
          m.transparent = true;
          m.opacity = S.opacity;
          if (tex && !m.map) { m.map = tex; m.color.set(0xffffff); }
          m.needsUpdate = true;
        });
        c.castShadow = true;
        c.receiveShadow = true;
      });
    } catch (e) {
      console.warn('GLB load failed, using box tiles'); baseModel = null;
    }
  }

  /*
    TILE GEOMETRY:
    BoxGeometry(width, height, depth)
    - width  = tile width  (X axis)
    - height = tile THICKNESS (Y axis) — keep small (12mm)
    - depth  = tile depth  (Z axis)
    
    The box is centered at its origin.
    To place it FLAT on the floor:
      position.y = S.floorY + TILE_THICKNESS / 2
    
    This puts the BOTTOM face of the box exactly at S.floorY.
  */
  const TILE_THICKNESS = 0.012; /* 12mm */
  const tileColors = [0xD4A96A, 0xC09050, 0xE0B878, 0xB88040];

  /* Shared material for all box tiles — much faster than cloning per tile */
  const sharedMat = new THREE.MeshStandardMaterial({
    roughness: 0.30,
    metalness: 0.06,
    transparent: true,
    opacity: S.opacity,
    ...(tex ? { map: tex, color: new THREE.Color(0xffffff) } : { color: new THREE.Color(0xD4A96A) }),
  });

  for (let i = 0; i < positions.length; i++) {
    const p = positions[i];
    let tile;

    if (baseModel) {
      tile = baseModel.clone(true);
      tile.rotation.y = p.rot;
      tile.position.set(p.x, S.floorY, p.z);
    } else {
      /*
        Create a FLAT box:
        - width  = p.w - small gap (gap between tiles for grout)
        - height = TILE_THICKNESS (12mm, stays thin and horizontal)
        - depth  = p.h - small gap
        
        Place it so BOTTOM = S.floorY:
          center.y = S.floorY + TILE_THICKNESS / 2
      */
      const geo = new THREE.BoxGeometry(
        p.w - 0.004,       /* X: tile width */
        TILE_THICKNESS,    /* Y: tile thickness (12mm) — HORIZONTAL! */
        p.h - 0.004        /* Z: tile depth */
      );

      let mat;
      if (tex) {
        mat = sharedMat; /* reuse shared material */
      } else {
        mat = sharedMat.clone();
        mat.color.set(tileColors[i % tileColors.length]);
      }

      tile = new THREE.Mesh(geo, mat);
      tile.castShadow = true;
      tile.receiveShadow = true;
      tile.rotation.y = p.rot;

      /*
        KEY PLACEMENT:
        Y position = floor + half thickness
        = tiles sit ON the floor, not going through it
        = tiles are HORIZONTAL (lying flat)
      */
      tile.position.set(p.x, S.floorY + TILE_THICKNESS / 2, p.z);
    }

    zoneGroup.add(tile);

    /* Yield every 15 tiles to avoid blocking the UI */
    if (i % 15 === 0) {
      const pct = Math.round((i + 1) / total * 100);
      tilingFill.style.width = pct + '%';
      tilingText.textContent = (i + 1) + ' / ' + total + ' tuiles';
      await new Promise(r => requestAnimationFrame(r));
    }
  }

  tilingProgress.classList.remove('visible');
  S.tileZoneGroups.push(zoneGroup);

  const id = ++S.meshIdCounter;
  S.placedObjects.push({
    id, group: zoneGroup,
    name: product.name + ' (zone)',
    productId: product.id,
    scaleVal: 1, baseScale: 1, isTileZone: true,
  });
  selectObject(id);
  updatePlacedBadge();
  setStatus('✓ ' + total + ' tuiles posées · ' + S.selectedPattern, 'ok');
  postToFlutter({ type: 'tile_zone', count: total });
  drawZoneBtn.className = 'qBtn qBtn-poly';
}

/* ═══════════════════════════════════════════════════════════════
   OBJECT MANAGEMENT
═══════════════════════════════════════════════════════════════ */
function selectObject(id) {
  S.selectedObjectId = id;
  const obj = S.placedObjects.find(o => o.id === id);
  if (!obj) return;
  selProdName.textContent = obj.name || 'Objet';
  actionBar.classList.add('visible');
}
function deselectObject() { S.selectedObjectId = null; actionBar.classList.remove('visible'); }
function scaleObject(obj, val) {
  const c = Math.max(0.05, Math.min(8, val));
  obj.scaleVal = c;
  if (obj.isTileZone) obj.group.scale.setScalar(c);
}
function deleteSelected() {
  const obj = S.placedObjects.find(o => o.id === S.selectedObjectId);
  if (!obj) return;
  scene.remove(obj.group);
  S.placedObjects = S.placedObjects.filter(o => o.id !== S.selectedObjectId);
  S.tileZoneGroups = S.tileZoneGroups.filter(g => g !== obj.group);
  deselectObject();
  updatePlacedBadge();
  deleteHint.classList.add('show');
  setTimeout(() => deleteHint.classList.remove('show'), 600);
  postToFlutter({ type: 'removed', count: S.placedObjects.length });
}
function updatePlacedBadge() {
  const n = S.placedObjects.length;
  placedCountEl.textContent = n;
  placedBadge.classList.toggle('visible', n > 0);
}

$id('aBtnConfirm').addEventListener('click', deselectObject);
$id('aBtnDelete').addEventListener('click', deleteSelected);

/* ═══════════════════════════════════════════════════════════════
   SHEET DRAG
═══════════════════════════════════════════════════════════════ */
const PEEK = 82, MID = 260, FULL = Math.round(window.innerHeight * 0.6);
let shDragStartY = null, shDragStartH = 0;
function setSheetH(h, anim = true) {
  sheet.style.transition = anim ? 'height .35s cubic-bezier(.32,.72,0,1)' : 'none';
  sheet.style.height = h + 'px';
}
function snapSheet(h) {
  const m1 = (PEEK + MID) / 2, m2 = (MID + FULL) / 2;
  setSheetH(h < m1 ? PEEK : h < m2 ? MID : FULL);
}
const handleEl = $id('sheetHandle');
handleEl.addEventListener('mousedown', e => { shDragStartY = e.clientY; shDragStartH = sheet.getBoundingClientRect().height; sheet.style.transition = 'none'; });
handleEl.addEventListener('touchstart', e => { shDragStartY = e.touches[0].clientY; shDragStartH = sheet.getBoundingClientRect().height; sheet.style.transition = 'none'; }, { passive: true });
window.addEventListener('mousemove', e => { if (shDragStartY === null) return; sheet.style.height = Math.max(PEEK, Math.min(FULL, shDragStartH + (shDragStartY - e.clientY))) + 'px'; });
window.addEventListener('touchmove', e => { if (shDragStartY === null) return; sheet.style.height = Math.max(PEEK, Math.min(FULL, shDragStartH + (shDragStartY - e.touches[0].clientY))) + 'px'; }, { passive: true });
function onSheetEnd() { if (shDragStartY === null) return; const h = sheet.getBoundingClientRect().height; shDragStartY = null; snapSheet(h); }
window.addEventListener('mouseup', onSheetEnd);
window.addEventListener('touchend', onSheetEnd);
handleEl.addEventListener('click', () => { const h = sheet.getBoundingClientRect().height; setSheetH(h <= PEEK + 10 ? MID : h >= FULL - 20 ? PEEK : FULL); });

/* ═══════════════════════════════════════════════════════════════
   CAPTURE
═══════════════════════════════════════════════════════════════ */
async function doCapture() {
  const showToast = (icon, txt) => {
    $id('saveToastIcon').textContent = icon;
    $id('saveToastText').textContent = txt;
    const t = $id('saveToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  };
  try {
    /* Composite: video + three.js canvas */
    const cap = document.createElement('canvas');
    cap.width = window.innerWidth;
    cap.height = window.innerHeight;
    const cc = cap.getContext('2d');
    try { cc.drawImage(videoEl, 0, 0, cap.width, cap.height); } catch {}
    renderer3.render(scene, camera3);
    cc.drawImage(threeCanvas, 0, 0);
    cc.drawImage(polyDrawCanvas, 0, 0);
    const blob = await new Promise(res => cap.toBlob(res, 'image/png'));
    if (!blob) { showToast('❌', 'Erreur'); return; }
    const file = new File([blob], 'placeAR.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: 'PlaceAR' }); showToast('📸', 'Partagé !'); return; } catch {}
    }
    const a = document.createElement('a');
    a.download = 'placeAR.png';
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    showToast('💾', 'Sauvegardée !');
  } catch (e) { showToast('❌', 'Erreur capture'); }
  postToFlutter({ type: 'capture' });
}

/* ═══════════════════════════════════════════════════════════════

window.loadProductCatalog = function(products) {
  S.catalog = products;
  setStatus(products.length + ' produit(s) chargé(s)', 'ok');
};

/* ═══════════════════════════════════════════════════════════════
   FLUTTER BRIDGE
═══════════════════════════════════════════════════════════════ */
function postToFlutter(obj) {
  try {
    if (window.flutter_inappwebview) { window.flutter_inappwebview.callHandler('FlutterBridge', JSON.stringify(obj)); return; }
    if (typeof FlutterBridge !== 'undefined') { FlutterBridge.postMessage(JSON.stringify(obj)); return; }
    if (window.webkit?.messageHandlers?.FlutterBridge) { window.webkit.messageHandlers.FlutterBridge.postMessage(JSON.stringify(obj)); }
  } catch (e) { console.log('[Bridge]', obj); }
}

window.receiveFromFlutter = function(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    if (data.type === 'catalog' && data.products) window.loadProductCatalog(data.products);
    if (data.type === 'clear') {
      S.placedObjects.forEach(o => scene && scene.remove(o.group));
      S.placedObjects = []; S.tileZoneGroups = [];
      deselectObject(); updatePlacedBadge();
    }
    /* Override floor Y from Flutter (e.g. ARCore depth sensor) */
    if (data.type === 'setFloorY' && typeof data.y === 'number') {
      S.floorY = data.y;
      floorMesh.position.y = data.y;
      setStatus('Sol calibré à Y=' + data.y.toFixed(2) + 'm', 'ok');
    }
    /* Override camera pose from Flutter */
    if (data.type === 'setCamPose') {
      if (data.height) camera3.position.y = data.height;
      if (data.tiltDeg) camera3.rotation.x = -THREE.MathUtils.degToRad(data.tiltDeg);
      camera3.updateMatrixWorld(true);
    }
  } catch (e) { console.error('receiveFromFlutter', e); }
};

function loadFromUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const pp = params.get('products');
  if (!pp) return;
  try {
    const products = JSON.parse(decodeURIComponent(pp));
    const mapped = products.map(p => ({
      id: p.id || p._id,
      name: p.name,
      modelUrl: p.modelUrl || p.model3D || '',
      imageUrl: p.imageUrl || p.image || p.thumbnail || '',
      category: p.category || 'Carrelage',
    }));
    setTimeout(() => window.loadProductCatalog(mapped), 500);
  } catch (e) { console.error('URL params parse error', e); }
}

function esc(s) {
  if (!s) return '';
  return s.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

  S.xrSupported = await checkXRSupport();
  if (S.xrSupported) {
