<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>FloorAR · WebXR 3D Tiles</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#F59064;--secondary:#284F75;
  --lg:#F0F0F0;--lg2:#F7F7F7;--dg:#6E6E6E;--grey:#AAAAAA;
  --green:#52B46B;--red:#DD5050;--font:'Montserrat',sans-serif;
  --r-sm:8px;--r-md:14px;--r-lg:22px;--r-xl:32px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:var(--font)}
#threeCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
#polyDrawCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}
#interactionCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:4;cursor:crosshair}

#splash{position:fixed;inset:0;z-index:100;background:var(--secondary);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#splash.hidden{opacity:0;pointer-events:none}
.splashInner{display:flex;flex-direction:column;align-items:center;padding:0 32px;text-align:center}
#splashIcon{width:72px;height:72px;border-radius:24px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin-bottom:22px;border:1px solid rgba(255,255,255,.2)}
#splashTitle{font-size:30px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:10px}
#splashSub{font-size:13px;font-weight:500;color:rgba(255,255,255,.65);line-height:1.7;max-width:280px;margin-bottom:36px}
#splashBtn{padding:14px 38px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-xl);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(245,144,100,.4)}

#topBar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:linear-gradient(to bottom,rgba(17,17,17,.7),transparent);pointer-events:none}
#topBar>*{pointer-events:auto}
#appLogoText{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.topPill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-xl);font-size:10px;font-weight:600;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);color:#fff;background:rgba(17,17,17,.5);cursor:pointer}
.topPill.active{background:rgba(82,180,107,.2);border-color:rgba(82,180,107,.5);color:#52B46B}
.topPill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.topPill.active .topPill-dot{animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:.9}50%{opacity:.2}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

#statusToast{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:21;display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--r-xl);font-size:11px;font-weight:500;color:rgba(255,255,255,.9);background:rgba(17,17,17,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.12);white-space:nowrap;pointer-events:none;max-width:92vw}
#statusDot{width:6px;height:6px;border-radius:50%;background:var(--grey);flex-shrink:0}
#statusToast.ok #statusDot{background:var(--green)}
#statusToast.scanning #statusDot{background:var(--primary);animation:pulse .8s infinite}
#statusToast.error #statusDot{background:var(--red)}
#statusToast.poly #statusDot{background:#FF3B30}

#glbLoader{position:fixed;inset:0;z-index:50;background:rgba(10,10,15,.8);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#glbLoader.visible{display:flex}
.spin{width:34px;height:34px;border:3px solid rgba(245,144,100,.25);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite}

#polyControls{position:fixed;bottom:110px;left:0;right:0;z-index:22;display:none;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
#polyControls.visible{display:flex}
#polyControls>*{pointer-events:auto}
.polyInfoPill{background:rgba(17,17,17,.88);backdrop-filter:blur(14px);border:1px solid rgba(255,59,48,.4);border-radius:var(--r-xl);padding:8px 20px;font-size:11px;font-weight:600;color:#fff}
.polyInfoPill span{color:#FF3B30}
.polyBtnRow{display:flex;gap:10px}
.polyBtn{padding:10px 20px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700}
#pbUndo{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
#pbClose{background:#FF3B30;color:#fff;display:none}
#pbValidate{background:var(--green);color:#fff;display:none}
#pbCancel{background:rgba(255,255,255,.07);color:rgba(255,255,255,.55)}

#sheet{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#fff;border-radius:var(--r-lg) var(--r-lg) 0 0;display:flex;flex-direction:column;transition:height .35s cubic-bezier(.32,.72,0,1)}
#sheetHandle{width:100%;padding:12px 0 6px;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#handleBar{width:38px;height:4px;border-radius:3px;background:var(--lg)}
#quickRow{display:flex;align-items:center;gap:6px;padding:0 12px 10px;flex-shrink:0}
.qBtn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:9px 4px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:var(--font);font-size:10px;font-weight:600}
.qBtn-primary{background:var(--secondary);color:#fff}
.qBtn-ghost{background:var(--lg2);color:#474747}
.qBtn-poly{background:rgba(255,59,48,.1);color:#FF3B30;border:1.5px solid rgba(255,59,48,.3)}
.qBtn-poly-on{background:rgba(255,59,48,.22);color:#FF3B30;border:1.5px solid rgba(255,59,48,.6)}
.qBtn-icon{font-size:12px}
#sheetContent{flex:1;overflow-y:auto;padding:0 14px 28px;min-height:0}
#sheet.collapsed #sheetContent{overflow:hidden;opacity:0;pointer-events:none}
.secLabel{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--grey);margin:12px 0 8px}
#productScroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.prodCard{flex-shrink:0;width:130px;border-radius:var(--r-md);border:1.5px solid var(--lg);background:var(--lg2);cursor:pointer;overflow:hidden}
.prodCard.active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(245,144,100,.15)}
.prodCard-img{width:100%;height:70px;object-fit:cover;background:#e0e0e0}
.prodCard-body{padding:6px 8px 8px}
.prodCard-name{font-size:10px;font-weight:700;color:#111}
.prodCard-dims{font-size:9px;color:var(--dg)}
#dimsInfo{font-size:10px;color:var(--secondary);font-weight:600;margin-bottom:8px;padding:6px 10px;background:rgba(40,79,117,.07);border-radius:var(--r-sm);border-left:3px solid var(--secondary);display:none}
#jointRow{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.jointSwatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent}
.jointSwatch.active{border-color:var(--secondary)}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--lg);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--secondary);cursor:pointer}
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>
<canvas id="polyDrawCanvas"></canvas>
<canvas id="interactionCanvas"></canvas>

<div id="glbLoader"><div class="spin"></div><p>Chargement modèle 3D…</p></div>
<div id="splash"><div class="splashInner"><div id="splashIcon">🧱</div><div id="splashTitle">FloorAR</div><div id="splashSub">Délimitez votre sol · Visualisation 3D</div><button id="splashBtn">Commencer</button></div></div>

<div id="topBar"><span id="appLogoText">FloorAR</span><div id="arPill" class="topPill"><div class="topPill-dot"></div><span>WebXR</span></div></div>
<div id="statusToast"><div id="statusDot"></div><span id="statusText">Initialisation…</span></div>

<div id="polyControls"><div class="polyInfoPill" id="polyInfo">Tapez les <span>coins du sol</span> · 0 pt</div><div class="polyBtnRow"><button class="polyBtn" id="pbUndo">↩</button><button class="polyBtn" id="pbClose">⬡ Fermer</button><button class="polyBtn" id="pbValidate">✓ Valider</button><button class="polyBtn" id="pbCancel">✕</button></div></div>

<div id="sheet" class="collapsed" style="height:92px">
  <div id="sheetHandle"><div id="handleBar"></div></div>
  <div id="quickRow">
    <button class="qBtn qBtn-ghost" id="resetBtn">↺</button>
    <button class="qBtn qBtn-primary" id="polyBtn">⬡ Délimiter la zone</button>
    <button class="qBtn qBtn-ghost" id="captureBtn">📷</button>
  </div>
  <div id="sheetContent">
    <div class="secLabel">Produits</div>
    <div id="productScroll"><div style="padding:16px;color:var(--grey)">Chargement…</div></div>
    <div id="dimsInfo"></div>
    <div class="secLabel">Joint</div>
    <div id="jointRow">
      <div class="jointSwatch active" style="background:#e8e0d8" data-j="#e8e0d8"></div>
      <div class="jointSwatch" style="background:#c8c0b8" data-j="#c8c0b8"></div>
      <div class="jointSwatch" style="background:#888" data-j="#888"></div>
      <div class="jointSwatch" style="background:#444" data-j="#444"></div>
      <input type="range" id="jointSize" min="1" max="10" value="3" style="flex:1"/>
      <span id="jointSizeVal" style="font-size:10px">3</span>px
    </div>
    <div class="secLabel">Opacité</div>
    <input type="range" id="opacitySlider" min="30" max="100" value="88" step="1"/>
    <div class="secLabel">Dimensions carreau (cm)</div>
    <input type="range" id="tileWSlider" min="10" max="120" value="60" step="5"/>
    <input type="range" id="tileHSlider" min="10" max="120" value="60" step="5" style="margin-top:8px"/>
  </div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
<script>
'use strict';

/* ==================== ÉTAT ==================== */
const S = {
  xrSession: null, xrMode: false, hitMatrix: null, reticlePos: null,
  products: [], selectedProduct: null,
  tileCM: { w: 60, h: 60 },
  polyMode: false, polyPoints: [], polyClosed: false, polyValidated: false,
  opacity: 0.88, jointColor: '#e8e0d8', jointSize: 3,
  floorMesh: null, textureCache: null, textureUrl: '',
  glbLoading: false, glbTextureCanvas: null, useGlbTex: false
};

let scene, camera, renderer, gltfLoader, xrReticle;
const CLOSE_SNAP = 35;

/* ==================== THREE.JS ==================== */
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);
  
  camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 100);
  camera.position.set(0, 1.5, 2);
  
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('threeCanvas'), alpha: false, antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.xr.enabled = true;
  
  // Éclairage
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(2, 5, 3);
  sun.castShadow = true;
  sun.receiveShadow = true;
  scene.add(sun);
  scene.add(new THREE.PointLight(0xffffff, 0.4));
  
  // Reticule AR
  const ringGeo = new THREE.RingGeometry(0.08, 0.12, 24).rotateX(-Math.PI / 2);
  xrReticle = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x52B46B, emissive: 0x226622, side: THREE.DoubleSide }));
  xrReticle.visible = false;
  scene.add(xrReticle);
  
  gltfLoader = new THREE.GLTFLoader();
  
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    if (S.polyValidated) rebuildFloor();
  });
}

/* ==================== WEBXR ==================== */
async function startXR() {
  try {
    if (!navigator.xr) throw new Error('WebXR non supporté');
    const supported = await navigator.xr.isSessionSupported('immersive-ar');
    if (!supported) throw new Error('AR non supporté');
    
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test']
    });
    
    S.xrSession = session;
    S.xrMode = true;
    await renderer.xr.setSession(session);
    
    S.xrRefSpace = await session.requestReferenceSpace('local');
    const viewerSpace = await session.requestReferenceSpace('viewer');
    S.hitTestSource = await session.requestHitTestSource({ space: viewerSpace, entityTypes: ['plane', 'point'] });
    
    session.addEventListener('end', () => {
      S.xrMode = false;
      S.hitTestSource = null;
      xrReticle.visible = false;
      document.getElementById('arPill').classList.remove('active');
      setStatus('AR terminé', 'ok');
    });
    
    renderer.setAnimationLoop(arLoop);
    document.getElementById('arPill').classList.add('active');
    setStatus('Pointez le sol puis délimitez la zone', 'scanning');
    
  } catch (err) {
    console.error(err);
    setStatus('WebXR non disponible - Mode démo', 'error');
    S.xrMode = false;
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
  }
}

function arLoop(time, frame) {
  if (!frame) { renderer.render(scene, camera); return; }
  
  if (S.hitTestSource) {
    const hits = frame.getHitTestResults(S.hitTestSource);
    if (hits.length) {
      const pose = hits[0].getPose(S.xrRefSpace);
      if (pose) {
        xrReticle.visible = true;
        xrReticle.matrix.fromArray(pose.transform.matrix);
        S.hitMatrix = pose.transform.matrix;
        const pos = new THREE.Vector3();
        xrReticle.matrixWorld.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());
        S.reticlePos = pos;
      }
    } else {
      xrReticle.visible = false;
    }
  }
  renderer.render(scene, camera);
}

/* ==================== POLY CANVAS ==================== */
const polyCanvas = document.getElementById('polyDrawCanvas');
const interactionCanvas = document.getElementById('interactionCanvas');
let polyCtx;

function initPolyCanvas() {
  const w = innerWidth, h = innerHeight;
  polyCanvas.width = w; polyCanvas.height = h;
  interactionCanvas.width = w; interactionCanvas.height = h;
  polyCtx = polyCanvas.getContext('2d');
}

function ptDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function redrawPoly(curX, curY) {
  polyCtx.clearRect(0, 0, polyCanvas.width, polyCanvas.height);
  const pts = S.polyPoints;
  if (!pts.length) return;
  
  const nearFirst = pts.length >= 3 && curX !== undefined && ptDist({ x: curX, y: curY }, pts[0]) < CLOSE_SNAP;
  
  if (S.polyClosed || pts.length >= 3) {
    polyCtx.beginPath();
    polyCtx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) polyCtx.lineTo(pts[i].x, pts[i].y);
    polyCtx.closePath();
    polyCtx.fillStyle = 'rgba(245,144,100,0.15)';
    polyCtx.fill();
  }
  
  polyCtx.beginPath();
  polyCtx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) polyCtx.lineTo(pts[i].x, pts[i].y);
  if (!S.polyClosed && curX !== undefined) polyCtx.lineTo(curX, curY);
  polyCtx.strokeStyle = '#FF3B30';
  polyCtx.lineWidth = 2.5;
  polyCtx.stroke();
  
  pts.forEach((pt, i) => {
    polyCtx.beginPath();
    polyCtx.arc(pt.x, pt.y, i === 0 ? 9 : 6, 0, Math.PI * 2);
    polyCtx.fillStyle = i === 0 ? '#FF3B30' : '#fff';
    polyCtx.fill();
    polyCtx.fillStyle = '#000';
    polyCtx.font = 'bold 10px Montserrat';
    polyCtx.textAlign = 'center';
    polyCtx.fillText(i + 1, pt.x, pt.y - 18);
  });
  
  if (!S.polyClosed && pts.length >= 3 && nearFirst) {
    polyCtx.fillStyle = '#FF3B30';
    polyCtx.font = 'bold 10px Montserrat';
    polyCtx.fillText('⬡ Fermer', pts[0].x + 15, pts[0].y - 25);
  }
  
  updatePolyUI();
}

function updatePolyUI() {
  const n = S.polyPoints.length;
  document.getElementById('polyInfo').innerHTML = `Tapez les <span>coins</span> · ${n} pt${n > 1 ? 's' : ''}`;
  document.getElementById('pbClose').style.display = n >= 3 && !S.polyClosed ? 'block' : 'none';
  document.getElementById('pbValidate').style.display = S.polyClosed ? 'block' : 'none';
}

function enterPolyMode() {
  S.polyMode = true;
  S.polyPoints = [];
  S.polyClosed = false;
  document.getElementById('polyControls').classList.add('visible');
  document.getElementById('polyBtn').className = 'qBtn qBtn-poly-on';
  document.getElementById('polyBtn').innerHTML = '<span class="qBtn-icon">⬡</span> En cours…';
  setStatus('Tapez chaque coin du sol', 'poly');
  redrawPoly();
  setSheetHeight(SHEET_PEEK);
}

function closePoly() {
  if (S.polyPoints.length < 3) return;
  S.polyClosed = true;
  redrawPoly();
  setStatus('Polygone fermé · Validez', 'poly');
}

function validatePoly() {
  if (S.polyPoints.length < 3) return;
  S.polyClosed = true;
  S.polyValidated = true;
  S.polyMode = false;
  document.getElementById('polyControls').classList.remove('visible');
  document.getElementById('polyBtn').className = 'qBtn qBtn-poly';
  document.getElementById('polyBtn').innerHTML = '<span class="qBtn-icon">⬡</span> Délimiter la zone';
  rebuildFloor();
  setStatus('Zone validée ✓', 'ok');
  setSheetHeight(SHEET_MID);
}

function cancelPoly() {
  S.polyMode = false;
  S.polyPoints = [];
  S.polyClosed = false;
  document.getElementById('polyControls').classList.remove('visible');
  document.getElementById('polyBtn').className = 'qBtn qBtn-poly';
  document.getElementById('polyBtn').innerHTML = '<span class="qBtn-icon">⬡</span> Délimiter la zone';
  polyCtx.clearRect(0, 0, polyCanvas.width, polyCanvas.height);
  setStatus('Annulé', 'ok');
}

// Événements polygone
interactionCanvas.addEventListener('click', (e) => {
  if (!S.polyMode || S.polyClosed) return;
  const y = e.clientY;
  const sheetRect = document.getElementById('sheet').getBoundingClientRect();
  if (y > sheetRect.top) return;
  
  const pts = S.polyPoints;
  if (pts.length >= 3 && ptDist({ x: e.clientX, y: e.clientY }, pts[0]) < CLOSE_SNAP) {
    closePoly();
    return;
  }
  pts.push({ x: e.clientX, y: e.clientY });
  redrawPoly(e.clientX, e.clientY);
});

interactionCanvas.addEventListener('mousemove', (e) => {
  if (S.polyMode && !S.polyClosed) redrawPoly(e.clientX, e.clientY);
});

// Boutons poly
document.getElementById('pbUndo').addEventListener('click', () => {
  if (S.polyClosed) S.polyClosed = false;
  else if (S.polyPoints.length) S.polyPoints.pop();
  redrawPoly();
});
document.getElementById('pbClose').addEventListener('click', closePoly);
document.getElementById('pbValidate').addEventListener('click', validatePoly);
document.getElementById('pbCancel').addEventListener('click', cancelPoly);

/* ==================== RENDU 3D DU SOL ==================== */
function screenToWorldPlane(sx, sy, yLevel) {
  const ndcX = (sx / innerWidth) * 2 - 1;
  const ndcY = -(sy / innerHeight) * 2 + 1;
  const ray = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
  ray.sub(camera.position).normalize();
  const t = (yLevel - camera.position.y) / ray.y;
  if (t < 0) return null;
  return new THREE.Vector3(camera.position.x + ray.x * t, yLevel, camera.position.z + ray.z * t);
}

function rebuildFloor() {
  if (!S.polyValidated || S.polyPoints.length < 3) return;
  if (S.glbLoading) return;
  
  if (S.floorMesh) {
    scene.remove(S.floorMesh);
    if (S.floorMesh.geometry) S.floorMesh.geometry.dispose();
    if (S.floorMesh.material) S.floorMesh.material.dispose();
    S.floorMesh = null;
  }
  
  // Hauteur du sol
  let yFloor = 0;
  if (S.xrMode && S.reticlePos) {
    yFloor = S.reticlePos.y;
  } else {
    yFloor = 0;
    camera.position.set(0, 1.5, 2);
  }
  
  // Projeter les points écran → 3D
  const pts3D = [];
  for (const p of S.polyPoints) {
    let w3 = screenToWorldPlane(p.x, p.y, yFloor);
    if (!w3) w3 = new THREE.Vector3((p.x / innerWidth - 0.5) * 4, yFloor, (0.5 - p.y / innerHeight) * 3);
    pts3D.push(w3);
  }
  
  // Centrer sur le point de hit AR si disponible
  if (S.xrMode && S.reticlePos) {
    const center = pts3D.reduce((s, p) => ({ x: s.x + p.x, z: s.z + p.z }), { x: 0, z: 0 });
    center.x /= pts3D.length;
    center.z /= pts3D.length;
    const offset = { x: S.reticlePos.x - center.x, z: S.reticlePos.z - center.z };
    pts3D.forEach(p => { p.x += offset.x; p.z += offset.z; p.y = S.reticlePos.y; });
  }
  
  // Créer le shape
  const shape = new THREE.Shape();
  shape.moveTo(pts3D[0].x, pts3D[0].z);
  for (let i = 1; i < pts3D.length; i++) shape.lineTo(pts3D[i].x, pts3D[i].z);
  shape.closePath();
  
  const geometry = new THREE.ShapeGeometry(shape);
  
  // UV mapping pour le tile répété
  const tW = S.tileCM.w / 100;
  const tH = S.tileCM.h / 100;
  const positions = geometry.attributes.position.array;
  const uvs = new Float32Array(positions.length / 3 * 2);
  for (let i = 0; i < positions.length / 3; i++) {
    uvs[i * 2] = positions[i * 3] / tW;
    uvs[i * 2 + 1] = positions[i * 3 + 2] / tH;
  }
  geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  
  // Ajuster les Y
  for (let i = 0; i < positions.length / 3; i++) {
    positions[i * 3 + 1] = yFloor + 0.005;
  }
  geometry.attributes.position.needsUpdate = true;
  geometry.computeVertexNormals();
  
  // Texture
  const texture = buildTileTexture();
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  
  const material = new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    opacity: S.opacity,
    roughness: 0.5,
    metalness: 0.05,
    side: THREE.DoubleSide
  });
  
  S.floorMesh = new THREE.Mesh(geometry, material);
  S.floorMesh.receiveShadow = true;
  scene.add(S.floorMesh);
}

function buildTileTexture() {
  const PX_PER_CM = 5;
  const W = Math.max(32, Math.round(S.tileCM.w * PX_PER_CM));
  const H = Math.max(32, Math.round(S.tileCM.h * PX_PER_CM));
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  
  if (S.useGlbTex && S.glbTextureCanvas) {
    ctx.drawImage(S.glbTextureCanvas, 0, 0, W, H);
  } else if (S.textureCache) {
    ctx.drawImage(S.textureCache, 0, 0, W, H);
  } else {
    // Texture procédurale par défaut
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#d4cfc9');
    grad.addColorStop(1, '#c2bdb7');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#b0aba5';
    for (let i = 0; i < 200; i++) {
      ctx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
    }
  }
  
  // Joint
  if (S.jointSize > 0) {
    ctx.strokeStyle = S.jointColor;
    ctx.lineWidth = Math.max(1, Math.round(S.jointSize * PX_PER_CM / 8));
    ctx.strokeRect(ctx.lineWidth / 2, ctx.lineWidth / 2, W - ctx.lineWidth, H - ctx.lineWidth);
  }
  
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

function refreshFloorTexture() {
  if (!S.floorMesh) return;
  const oldTex = S.floorMesh.material.map;
  const newTex = buildTileTexture();
  newTex.wrapS = newTex.wrapT = THREE.RepeatWrapping;
  S.floorMesh.material.map = newTex;
  S.floorMesh.material.needsUpdate = true;
  if (oldTex) oldTex.dispose();
}

/* ==================== PRODUITS ==================== */
function ingestProducts(products) {
  S.products = products;
  const scroll = document.getElementById('productScroll');
  scroll.innerHTML = '';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prodCard';
    card.innerHTML = `<img class="prodCard-img" src="${p.image || ''}" onerror="this.style.background='#ccc'"><div class="prodCard-body"><div class="prodCard-name">${p.name}</div><div class="prodCard-dims">${p.dimensions ? p.dimensions.width + '×' + p.dimensions.height + ' cm' : ''}</div></div>`;
    card.addEventListener('click', () => selectProduct(p));
    scroll.appendChild(card);
  });
  if (products.length) selectProduct(products[0]);
}

function selectProduct(p) {
  S.selectedProduct = p;
  document.querySelectorAll('.prodCard').forEach(c => c.classList.remove('active'));
  document.querySelector(`.prodCard:has([src="${p.image}"])`)?.classList.add('active');
  
  if (p.dimensions) {
    S.tileCM = { w: p.dimensions.width, h: p.dimensions.height };
    document.getElementById('tileWSlider').value = S.tileCM.w;
    document.getElementById('tileHSlider').value = S.tileCM.h;
    const dimsDiv = document.getElementById('dimsInfo');
    dimsDiv.style.display = 'block';
    dimsDiv.textContent = `Dimensions: ${S.tileCM.w}×${S.tileCM.h} cm`;
  }
  
  // Charger texture ou GLB
  const textureUrl = p.texture || p.image;
  if (textureUrl) {
    S.useGlbTex = false;
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => {
      S.textureCache = img;
      if (S.polyValidated) refreshFloorTexture();
    };
    img.src = textureUrl;
  }
  
  if (p.model3D && p.model3D.endsWith('.glb')) {
    loadGLBTexture(p.model3D);
  }
}

async function loadGLBTexture(url) {
  S.glbLoading = true;
  document.getElementById('glbLoader').classList.add('visible');
  
  try {
    const gltf = await new Promise((res, rej) => gltfLoader.load(url, res, null, rej));
    const model = gltf.scene;
    model.traverse(c => {
      if (c.isMesh && c.material) {
        const mats = Array.isArray(c.material) ? c.material : [c.material];
        for (const mat of mats) {
          if (mat.map && mat.map.image) {
            S.glbTextureCanvas = mat.map.image;
            S.useGlbTex = true;
            S.textureCache = null;
            if (S.polyValidated) refreshFloorTexture();
            return;
          }
        }
      }
    });
  } catch (e) { console.warn('GLB load error:', e); }
  
  S.glbLoading = false;
  document.getElementById('glbLoader').classList.remove('visible');
}

/* ==================== UI ==================== */
function setStatus(msg, type = '') {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusToast').className = type;
}

// Sheet drag
const SHEET_PEEK = 92, SHEET_MID = 400, SHEET_FULL = Math.min(600, innerHeight * 0.85);
let dragStart = null, dragStartH = 0;

function setSheetHeight(h, animate = true) {
  const sheet = document.getElementById('sheet');
  sheet.style.transition = animate ? 'height 0.35s cubic-bezier(0.32, 0.72, 0, 1)' : 'none';
  sheet.style.height = h + 'px';
  sheet.classList.toggle('collapsed', h <= SHEET_PEEK + 10);
}

const sheetHandle = document.getElementById('sheetHandle');
sheetHandle.addEventListener('mousedown', e => { dragStart = e.clientY; dragStartH = document.getElementById('sheet').clientHeight; });
sheetHandle.addEventListener('touchstart', e => { dragStart = e.touches[0].clientY; dragStartH = document.getElementById('sheet').clientHeight; });
window.addEventListener('mousemove', e => { if (dragStart !== null) { let h = Math.max(SHEET_PEEK, Math.min(SHEET_FULL, dragStartH + (dragStart - e.clientY))); document.getElementById('sheet').style.height = h + 'px'; } });
window.addEventListener('touchmove', e => { if (dragStart !== null) { let h = Math.max(SHEET_PEEK, Math.min(SHEET_FULL, dragStartH + (dragStart - e.touches[0].clientY))); document.getElementById('sheet').style.height = h + 'px'; } });
window.addEventListener('mouseup', () => { if (dragStart !== null) { dragStart = null; const h = document.getElementById('sheet').clientHeight; setSheetHeight(h < (SHEET_PEEK + SHEET_MID) / 2 ? SHEET_PEEK : h < (SHEET_MID + SHEET_FULL) / 2 ? SHEET_MID : SHEET_FULL); } });
window.addEventListener('touchend', () => { if (dragStart !== null) { dragStart = null; const h = document.getElementById('sheet').clientHeight; setSheetHeight(h < (SHEET_PEEK + SHEET_MID) / 2 ? SHEET_PEEK : h < (SHEET_MID + SHEET_FULL) / 2 ? SHEET_MID : SHEET_FULL); } });

// Contrôles
document.getElementById('polyBtn').addEventListener('click', () => { if (S.polyMode) validatePoly(); else enterPolyMode(); });
document.getElementById('resetBtn').addEventListener('click', () => {
  if (S.polyMode) cancelPoly();
  S.polyValidated = false;
  S.polyPoints = [];
  S.polyClosed = false;
  if (S.floorMesh) { scene.remove(S.floorMesh); S.floorMesh = null; }
  polyCtx?.clearRect(0, 0, polyCanvas.width, polyCanvas.height);
  setStatus('Prêt · Délimitez une zone', 'ok');
  setSheetHeight(SHEET_PEEK);
});
document.getElementById('captureBtn').addEventListener('click', () => {
  renderer.render(scene, camera);
  setTimeout(() => {
    const canvas = document.createElement('canvas');
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(renderer.domElement, 0, 0);
    ctx.drawImage(polyCanvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'floorAR.png';
    a.href = canvas.toDataURL();
    a.click();
    setStatus('Capture ✓', 'ok');
  }, 50);
});

document.querySelectorAll('.jointSwatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.jointSwatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    S.jointColor = sw.dataset.j;
    refreshFloorTexture();
  });
});
document.getElementById('jointSize').addEventListener('input', e => {
  S.jointSize = parseInt(e.value);
  document.getElementById('jointSizeVal').textContent = e.value;
  refreshFloorTexture();
});
document.getElementById('opacitySlider').addEventListener('input', e => {
  S.opacity = parseInt(e.value) / 100;
  if (S.floorMesh) S.floorMesh.material.opacity = S.opacity;
});
document.getElementById('tileWSlider').addEventListener('input', e => {
  S.tileCM.w = parseInt(e.value);
  if (S.polyValidated) rebuildFloor();
});
document.getElementById('tileHSlider').addEventListener('input', e => {
  S.tileCM.h = parseInt(e.value);
  if (S.polyValidated) rebuildFloor();
});

// Demo products
function loadDemoProducts() {
  ingestProducts([
    { id: 1, name: 'Carreau Béton 60×60', image: '', dimensions: { width: 60, height: 60 }, category: 'Moderne' },
    { id: 2, name: 'Parquet Chêne 15×90', image: '', dimensions: { width: 15, height: 90 }, category: 'Parquet' },
    { id: 3, name: 'Mosaïque 30×30', image: '', dimensions: { width: 30, height: 30 }, category: 'Déco' },
    { id: 4, name: 'Ardoise 40×40', image: '', dimensions: { width: 40, height: 40 }, category: 'Pierre' }
  ]);
}

/* ==================== BOOT ==================== */
document.getElementById('splashBtn').addEventListener('click', async () => {
  document.getElementById('splash').classList.add('hidden');
  initThree();
  initPolyCanvas();
  await startXR();
  loadDemoProducts();
  setStatus('Prêt · Délimitez une zone', 'ok');
  setSheetHeight(SHEET_PEEK);
  
  // Animation loop simple pour le mode non-AR
  if (!S.xrMode) {
    function animate() {
      if (!S.xrMode) renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  }
});
</script>
